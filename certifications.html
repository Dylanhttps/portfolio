<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Certifications</title>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="techstack.html">Tech Stack</a></li>
            <li><a href="certifications.html">Certifications</a></li>
            <li><a href="contacts.html">Contact</a></li>
        </ul>
    </nav>

    <header><h1>Certificates</h1></header>
        
    <div class="container" style="text-align: center;">     
        <h3>My Credentials</h3>
        
        <div class="cert-wrapper">
            
            <div class="cert-frame">
                <div class="cert-card-inner">
                    <!-- Changed href to an onclick function -->
                    <a href="javascript:void(0);" onclick="openModal('images/python_cert.png')">
                        <img src="images/python_cert.png" alt="Python Essentials 1" class="cert-img-simple">
                    </a>
                    <p style="margin-top: 10px; font-size: 0.8rem;">Python Essentials 1</p>
                </div>
            </div>

            <div class="cert-frame">
                <div class="cert-card-inner">
                    <!-- Changed href to an onclick function -->
                    <a href="javascript:void(0);" onclick="openModal('images/mycertificate1.png')">
                        <img src="images/mycertificate1.png" alt="Software Engineering 1" class="cert-img-simple">
                    </a>
                    <p style="margin-top: 10px; font-size: 0.8rem;">Software Engineering</p>
                </div>
            </div>

        </div> 
    </div> 

    <!-- Lightbox Modal Overlay Structure -->
    <div id="certModal" class="modal" onclick="closeModal()">
        <span class="close-btn">&times;</span>
        <img class="modal-content" id="modalImg" onclick="event.stopPropagation()">
    </div>

    <!-- Lightbox Logic Scripts -->
    <script>
        function openModal(imageSrc) {
            var modal = document.getElementById("certModal");
            var modalImg = document.getElementById("modalImg");
            modal.style.display = "flex";
            modalImg.src = imageSrc;
        }

        function closeModal() {
            var modal = document.getElementById("certModal");
            modal.style.display = "none";
        }
    </script>

</body>
</html>
